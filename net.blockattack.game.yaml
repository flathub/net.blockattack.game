app-id: net.blockattack.game
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: blockattack
rename-icon: blockattack
rename-desktop-file: blockattack.desktop
finish-args:
  - --device=dri
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
cleanup:
  - /include
  - /lib/cmake
  - /share/man
  - "*.la"
  - "*.a"
modules:
  - shared-modules/physfs/physfs.json

  - name: boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix="${FLATPAK_DEST}" --with-libraries=program_options
      - ./b2 -j${FLATPAK_BUILDER_N_JOBS} install variant=release cxxstd=11 --layout=system
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.91.0/source/boost_1_91_0.tar.gz
        sha256: 5734305f40a76c30f951c9abd409a45a2a19fb546efe4162119250bbe4d3a463
        x-checker-data:
          type: anitya
          project-id: 6845
          url-template: https://archives.boost.io/release/$version/source/boost_${version0}_${version1}_$version2.tar.gz

  - name: blockattack
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/blockattack/blockattack-game.git
        tag: v2.10.0
        commit: 4a115797ad81dc3495d5ff5ae54c1c61ff929b57
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
      - type: shell
        commands:
          - ./packdata.sh
